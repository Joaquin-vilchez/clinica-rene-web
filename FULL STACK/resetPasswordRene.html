<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clínica René - Restablecer Contraseña</title>
    <link rel="stylesheet" href="loginRene.css"> 
    <style>
        /* Estilos específicos para el formulario de reseteo */
        /* Aseguramos que ocupe toda la pantalla y use el fondo degradado */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .reset-container {
            background-color: var(--white);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-medium);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }
        .reset-container h2 {
            color: var(--dark-blue);
            margin-bottom: 20px;
        }
        .reset-container p {
            margin-bottom: 30px;
            color: #666;
        }
        /* Estilos de input-group para este formulario simple */
        .input-group {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
        }
        .input-group input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }
        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
        }
        .btn {
            width: 100%;
            margin-top: 10px;
        }
        #message {
            margin-top: 20px;
            font-weight: bold;
        }
        .secondary-btn {
            background-color: #ddd;
            color: var(--dark-blue);
        }
        .secondary-btn:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>

    <div class="reset-container">
        <h2 id="resetTitle">Restablecer Contraseña</h2>
        <p id="resetInstruction">Ingrese su nueva contraseña (mínimo 6 caracteres).</p>

        <form id="resetForm">
            <div class="input-group">
                <i>🔒</i>
                <input type="password" id="newPassword" placeholder="Nueva Contraseña" required minlength="6" />
            </div>
            <div class="input-group">
                <i>🔒</i>
                <input type="password" id="confirmPassword" placeholder="Confirmar Contraseña" required minlength="6" />
            </div>

            <button type="submit" class="btn">Cambiar Contraseña</button>
        </form>

        <p id="message" style="color: red;"></p>

        <a href="/loginRene.html" class="btn secondary-btn" style="display: none; margin-top: 20px;" id="loginLink">Ir a Iniciar Sesión</a>
    </div>

    <script>
        const resetForm = document.getElementById('resetForm');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const messageElement = document.getElementById('message');
        const loginLink = document.getElementById('loginLink');
        const resetInstruction = document.getElementById('resetInstruction');
        
        // 1. Obtener el token de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            messageElement.textContent = "Error: Token de restablecimiento no encontrado.";
            messageElement.style.color = 'red';
            resetForm.style.display = 'none';
            loginLink.style.display = 'inline-block';
            resetInstruction.textContent = "Por favor, use el enlace completo enviado a su correo."
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Validaciones de la contraseña
            if (newPassword !== confirmPassword) {
                messageElement.textContent = 'Las contraseñas no coinciden.';
                messageElement.style.color = 'red';
                return;
            }

            if (newPassword.length < 6) {
                messageElement.textContent = 'La contraseña debe tener al menos 6 caracteres.';
                messageElement.style.color = 'red';
                return;
            }

            messageElement.textContent = 'Cambiando contraseña...';
            messageElement.style.color = '#333';

            try {
                // 2. Enviar el token (obtenido de la URL) y la nueva contraseña
                const response = await fetch('/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token, newPassword }),
                });

                const data = await response.json();

                if (data.ok) {
                    messageElement.textContent = data.message;
                    messageElement.style.color = 'green';
                    resetForm.style.display = 'none'; // Ocultar el formulario
                    loginLink.style.display = 'inline-block'; // Mostrar enlace de inicio de sesión
                    resetInstruction.textContent = '¡Proceso completado!'
                } else {
                    messageElement.textContent = data.message || 'Error desconocido al cambiar la contraseña.';
                    messageElement.style.color = 'red';
                    // Si el token es inválido/expirado, mostramos el link de login
                    if (data.error === 'invalid_token') {
                        resetForm.style.display = 'none';
                        loginLink.style.display = 'inline-block'; 
                    }
                }
            } catch (error) {
                console.error('Error de red:', error);
                messageElement.textContent = 'No se pudo conectar con el servidor. Intente más tarde.';
                messageElement.style.color = 'red';
            }
        });

    </script>
</body>
</html>
